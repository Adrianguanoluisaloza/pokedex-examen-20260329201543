<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Pokédex</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="styles.css?v=2026033005">
</head>
<body>
    <header class="topbar">
        <div class="wrap topbar-inner">
            <div class="brand-copy">
                <p class="eyebrow">Interfaz inspirada en hardware</p>
                <h1>Pokédex</h1>
                <p>Referencia visual basada en la consola plegable clásica.</p>
            </div>
            <div class="leds" aria-hidden="true">
                <span class="led led-blue"></span>
                <span class="led led-red"></span>
                <span class="led led-yellow"></span>
                <span class="led led-green"></span>
            </div>
        </div>
    </header>

    <main class="wrap pokedex-shell page-grid">
        <section class="panel panel-left">
            <div class="panel-top panel-top-left" aria-hidden="true">
                <span class="lens"></span>
                <span class="mini-light red"></span>
                <span class="mini-light yellow"></span>
                <span class="mini-light green"></span>
            </div>

            <div class="panel-head">
                <h2>Listado de Pokémon</h2>
                <div class="pagination">
                    <button id="btn-prev" type="button" class="btn" disabled>Previous</button>
                    <button id="btn-next" type="button" class="btn">Next</button>
                </div>
            </div>

            <div class="screen-frame">
                <p id="status" class="status" role="status">Cargando Pokémon...</p>
                <ul id="pokemon-list" class="pokemon-list" aria-label="Lista de pokemon"></ul>
            </div>

            <div class="console-controls" aria-hidden="true">
                <span class="nav-dot"></span>
                <div class="mini-monitor">
                    <span></span>
                </div>
                <div class="dpad">
                    <span class="dpad-v"></span>
                    <span class="dpad-h"></span>
                </div>
            </div>

            <div class="panel-footer panel-footer-left" aria-hidden="true">
                <div class="action-buttons">
                    <span class="action action-red"></span>
                    <span class="action action-blue"></span>
                </div>
                <div class="speaker speaker-left">
                    <span></span>
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </section>

        <div class="hinge" aria-hidden="true"></div>

        <aside class="panel panel-right" aria-live="polite">
            <div class="panel-top panel-top-right" aria-hidden="true">
                <span class="lens"></span>
                <span class="mini-light red"></span>
                <span class="mini-light yellow"></span>
                <span class="mini-light green"></span>
            </div>

            <div class="panel-title">
                <h2>Detalle del Pokémon</h2>
                <span class="title-accent"></span>
            </div>

            <div class="screen-frame screen-detail">
                <div id="pokemon-detail" class="detail-empty">
                    Selecciona un Pokémon de la lista para ver su detalle.
                </div>
            </div>

            <div class="right-console" aria-hidden="true">
                <div class="keypad">
                    <span></span><span></span><span></span><span></span>
                    <span></span><span></span><span></span><span></span>
                </div>
                <div class="control-row">
                    <span class="white-key white-key-left"></span>
                    <span class="white-key white-key-right"></span>
                    <span class="yellow-button"></span>
                </div>
                <div class="speaker speaker-right">
                    <span></span>
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </aside>
    </main>

    <script src="pokemon.js?v=2026033005" defer></script>
</body>
</html>
