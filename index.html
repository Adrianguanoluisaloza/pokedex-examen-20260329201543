<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="topbar">
        <div class="wrap">
            <h1>Pokédex</h1>
            <p>Explorador de Pokémon</p>
        </div>
    </header>

    <main class="wrap page-grid">
        <section class="panel">
            <div class="panel-head">
                <h2>Listado de Pokémon</h2>
                <div class="pagination">
                    <button id="btn-prev" type="button" class="btn" disabled>Previous</button>
                    <button id="btn-next" type="button" class="btn">Next</button>
                </div>
            </div>

            <p id="status" class="status" role="status">Cargando Pokémon...</p>
            <ul id="pokemon-list" class="pokemon-list" aria-label="Lista de pokemon"></ul>
        </section>

        <aside class="panel" aria-live="polite">
            <h2>Detalle del Pokémon</h2>
            <div id="pokemon-detail" class="detail-empty">
                Selecciona un Pokémon de la lista para ver su detalle.
            </div>
        </aside>
    </main>

    <script src="pokemon.js" defer></script>
</body>
</html>
